</style></head><body><main class="app"><section class="hero"><span class="badge">BRASIL × NORUEGA • 2026</span><h1>Convocado<br><span>pela IA</span></h1><p>Selfie + camisa escolhida → IA gera uma foto realista vestindo a camisa. Depois a página monta o crachá.</p></section><section class="form"><div><label>Nome</label><input id="nome" type="text" maxlength="18" placeholder="Ex: Beto"></div><div><label>Cidade</label><input id="cidade" type="text" maxlength="22" placeholder="Ex: Maceió"></div><div><label>Jogador-chave</label><input id="jogador" type="text" maxlength="24" placeholder="Ex: Vini capota"></div><div><div class="legend">Camisa</div><div class="grid2"><label class="opt"><input type="radio" name="camisa" value="amarela" checked><span>Camisa 1<br>Amarela</span></label><label class="opt"><input type="radio" name="camisa" value="azul"><span>Camisa 2<br>Azul</span></label></div></div><label class="upload" for="foto"><img id="thumb" alt="prévia"><span><b>Enviar selfie frontal</b><br><small>Sem óculos escuros, rosto claro.</small></span></label><input id="foto" type="file" accept="image/*"><div><label>Palpite</label><div class="score"><input id="gbra" type="number" min="0" max="9" value="2"><span>×</span><input id="gnor" type="number" min="0" max="9" value="1"></div></div><div><label>Confiança</label><div class="range"><input id="conf" type="range" min="1" max="99" value="83"><output id="confOut">83%</output></div></div><div id="erro" class="err"></div><button id="gerar" class="btn">Gerar meu crachá</button><p class="hint">Requer Worker publicado e chave OpenAI configurada.</p></section><section id="saida" class="out"><h2>Credencial aprovada ✓</h2><div class="frame"><img id="preview" alt="Crachá gerado"></div><button id="baixar" class="ghost">Baixar imagem</button></section><canvas id="canvas" width="1080" height="1920"></canvas></main><div id="loading" class="loading"><div><div class="spin"></div><p>Gerando foto realista com a camisa escolhida...</p></div></div><script>
const API='https://cracha-ia-da-torcida-api.alberto-s-brito.workers.dev/api/generate-shirt-image',$=id=>document.getElementById(id),cv=$('canvas'),ctx=cv.getContext('2d');let selfie='',finalBlob=null,aiImg=null;$('conf').oninput=e=>$('confOut').textContent=e.target.value+'%';$('foto').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{selfie=r.result;$('thumb').src=selfie};r.readAsDataURL(f)};function err(m){$('erro').textContent=m;$('erro').classList.add('on')}function ok(){$('erro').classList.remove('on')}function img(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=src})}function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function coverTop(im,x,y,w,h){const r=Math.max(w/im.width,h/im.height),dw=im.width*r,dh=im.height*r,dx=x+(w-dw)/2,dy=y;ctx.drawImage(im,dx,dy,dw,dh)}async function geraIA(camisa){const r=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({selfieDataUrl:selfie,shirt:camisa})});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={error:t}}if(!r.ok||!j.imageDataUrl)throw new Error(j.error||'A API não retornou imagem.');return img(j.imageDataUrl)}function draw(d){ctx.fillStyle='#03120b';ctx.fillRect(0,0,1080,1920);let g=ctx.createRadialGradient(160,120,10,160,120,820);g.addColorStop(0,'rgba(255,223,0,.34)');g.addColorStop(1,'rgba(255,223,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,1080,1920);ctx.strokeStyle='rgba(255,223,0,.75)';ctx.lineWidth=4;round(45,45,990,1830,38);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.18)';round(465,72,150,28,14);ctx.fill();ctx.textAlign='center';ctx.fillStyle='#ffdf00';ctx.font='52px Anton';ctx.fillText('CONVOCADO PELA IA',540,155);ctx.fillStyle='#f6f1df';ctx.font='25px IBM Plex Mono';ctx.fillText('BRASIL × NORUEGA • 2026',540,205);ctx.save();round(90,220,900,960,34);ctx.clip();coverTop(aiImg,90,220,900,960);let v=ctx.createLinearGradient(0,720,0,1120);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,.78)');ctx.fillStyle=v;ctx.fillRect(120,720,840,400);ctx.restore();ctx.fillStyle=d.camisa==='azul'?'#1556c8':'#ffdf00';round(335,850,410,44,8);ctx.fill();ctx.fillStyle=d.camisa==='azul'?'#fff':'#06200f';ctx.font='20px IBM Plex Mono';ctx.fillText(d.camisa==='azul'?'CAMISA 2 • AZUL GERADA POR IA':'CAMISA 1 • AMARELA GERADA POR IA',540,880);ctx.fillStyle='rgba(4,36,18,.92)';round(235,920,610,54,27);ctx.fill();ctx.fillStyle='#ffdf00';ctx.font='20px IBM Plex Mono';ctx.fillText('✓ FOTO OFICIAL DA TORCIDA',540,955);ctx.fillStyle='#f3f0df';ctx.font='132px Anton';ctx.fillText(d.nome.toUpperCase(),540,1135);ctx.fillStyle='#ffdf00';ctx.font='54px Anton';ctx.fillText('ANALISTA-CHEFE DA ARQUIBANCADA',540,1215);ctx.fillStyle='rgba(246,241,223,.65)';ctx.font='22px IBM Plex Mono';ctx.fillText(d.cidade.toUpperCase(),540,1260);ctx.fillStyle='#dce1d5';ctx.font='25px IBM Plex Mono';ctx.fillText('PALPITE',540,1360);ctx.font='98px Anton';ctx.fillStyle='#ffdf00';ctx.fillText(d.gbra,435,1460);ctx.fillStyle='#f3f0df';ctx.fillText('×',540,1450);ctx.fillText(d.gnor,645,1460);ctx.fillStyle='#ffdf00';ctx.font='66px Anton';ctx.fillText(d.conf+'%',250,1630);ctx.fillStyle='#d7ddcf';ctx.font='25px IBM Plex Mono';ctx.fillText('JOGADOR-CHAVE: '+d.jogador.toUpperCase(),540,1725);ctx.fillStyle='#f4f1df';ctx.font='italic 800 38px Archivo';ctx.fillText('Hoje o dado é simples: Brasil vence.',540,1810);ctx.fillStyle='#ffdf00';ctx.font='26px IBM Plex Mono';ctx.fillText('GERE O SEU • @ALBERTOBRI7O',540,1905)}$('gerar').onclick=async()=>{ok();const nome=$('nome').value.trim(),cidade=$('cidade').value.trim(),jogador=$('jogador').value.trim(),camisa=document.querySelector('input[name=camisa]:checked').value;if(!nome||!cidade||!jogador||!selfie)return err('Preencha tudo e envie uma selfie.');$('loading').classList.add('on');$('gerar').disabled=true;try{aiImg=await geraIA(camisa);draw({nome,cidade,jogador,camisa,gbra:$('gbra').value,gnor:$('gnor').value,conf:$('conf').value});finalBlob=await new Promise(r=>cv.toBlob(r,'image/png'));$('preview').src=URL.createObjectURL(finalBlob);$('saida').classList.add('on');$('saida').scrollIntoView({behavior:'smooth'})}catch(e){err(e.message)}finally{$('loading').classList.remove('on');$('gerar').disabled=false}};$('baixar').onclick=()=>{if(!finalBlob)return;const a=document.createElement('a');a.href=URL.createObjectURL(finalBlob);a.download='cracha-ia-torcida.png';a.click()};
</script></body></html>
