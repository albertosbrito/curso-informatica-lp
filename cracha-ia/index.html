<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crachá IA da Torcida</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;700;800;900&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:linear-gradient(180deg,#08351f,#03120b 65%,#010604);color:#f6f1df;font-family:Archivo,system-ui,sans-serif;display:flex;justify-content:center}.app{width:100%;max-width:540px;padding:24px 18px 56px}.hero{border:1px solid rgba(255,223,0,.28);border-radius:28px;padding:26px 20px;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.65)),url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80') center/cover;box-shadow:0 24px 80px rgba(0,0,0,.46)}.badge{display:inline-block;background:#ffdf00;color:#08210f;font:700 12px 'IBM Plex Mono';letter-spacing:.12em;padding:8px 12px;border-radius:999px}.hero h1{font:400 clamp(46px,13vw,70px) Anton;line-height:.9;text-transform:uppercase;margin-top:18px}.hero h1 span{color:#ffdf00}.hero p{max-width:34ch;color:#d4ddce;line-height:1.45;margin-top:14px}.form{margin-top:22px;display:grid;gap:16px}label,.legend{display:block;color:#9ec7a6;font:700 11px 'IBM Plex Mono';letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}input[type=text],input[type=number]{width:100%;padding:14px 13px;border-radius:14px;border:1px solid #1b6b41;background:rgba(2,14,8,.8);color:#f6f1df;font:700 16px Archivo}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{position:relative}.opt input{position:absolute;opacity:0}.opt span{display:block;border:1px solid #1b6b41;border-radius:16px;background:rgba(2,14,8,.78);padding:14px 12px;cursor:pointer;font-weight:800;color:#d6e5d7}.opt input:checked+span{border-color:#ffdf00;background:rgba(255,223,0,.16)}.upload{display:flex;gap:14px;align-items:center;padding:14px;border:1.5px dashed #1b6b41;border-radius:16px;background:rgba(2,14,8,.78);cursor:pointer}.upload img{width:68px;height:68px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.08)}#foto{position:absolute;opacity:0;width:1px;height:1px}.score{display:flex;gap:10px;align-items:center}.score input{text-align:center;font:400 30px Anton;color:#ffdf00}.score span{font:400 28px Anton}.range{display:flex;align-items:center;gap:12px}input[type=range]{flex:1;accent-color:#ffdf00}output{font:400 32px Anton;color:#ffdf00;min-width:78px;text-align:right}.btn{border:0;border-radius:17px;background:linear-gradient(180deg,#ffe34b,#c99b00);color:#06200f;font:400 28px Anton;text-transform:uppercase;padding:18px;box-shadow:0 18px 44px rgba(255,223,0,.22);cursor:pointer}.btn:disabled{opacity:.65}.err{display:none;padding:12px 13px;border:1px solid rgba(255,107,94,.45);border-radius:14px;background:rgba(255,107,94,.12);color:#ffd1cc;line-height:1.4}.err.on{display:block}.loading{display:none;position:fixed;inset:0;background:rgba(1,8,5,.92);z-index:20;align-items:center;justify-content:center;text-align:center;padding:24px}.loading.on{display:flex}.spin{width:74px;height:74px;border-radius:50%;border:6px solid rgba(255,223,0,.16);border-top-color:#ffdf00;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}.out{display:none;margin-top:28px}.out.on{display:block}.out h2{font:400 38px Anton;color:#ffdf00;text-transform:uppercase;margin-bottom:12px}.frame{border-radius:24px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.58);border:1px solid rgba(255,223,0,.24)}.frame img{width:100%;display:block}.ghost{margin-top:14px;width:100%;background:transparent;border:1px solid #ffdf00;color:#ffdf00;border-radius:14px;padding:14px;font:400 20px Anton;text-transform:uppercase}canvas{display:none}.hint{font-size:13px;color:#9fb09f;line-height:1.45;text-align:center}</style>
</head>
<body>
<main class="app">
<section class="hero"><span class="badge">BRASIL × NORUEGA • 2026</span><h1>Convocado<br><span>pela IA</span></h1><p>Selfie + camisa escolhida → IA gera uma foto realista vestindo a camisa. Depois a página monta o crachá.</p></section>
<section class="form">
<div><label>Nome</label><input id="nome" type="text" maxlength="18" placeholder="Ex: Beto"></div>
<div><label>Cidade</label><input id="cidade" type="text" maxlength="22" placeholder="Ex: Maceió"></div>
<div><label>Jogador-chave</label><input id="jogador" type="text" maxlength="24" placeholder="Ex: Vini capota"></div>
<div><div class="legend">Camisa</div><div class="grid2"><label class="opt"><input type="radio" name="camisa" value="amarela" checked><span>Camisa 1<br>Amarela</span></label><label class="opt"><input type="radio" name="camisa" value="azul"><span>Camisa 2<br>Azul</span></label></div></div>
<label class="upload" for="foto"><img id="thumb" alt="prévia"><span><b>Enviar selfie frontal</b><br><small>Sem óculos escuros, rosto claro.</small></span></label><input id="foto" type="file" accept="image/*">
<div><label>Palpite</label><div class="score"><input id="gbra" type="number" min="0" max="9" value="2"><span>×</span><input id="gnor" type="number" min="0" max="9" value="1"></div></div>
<div><label>Confiança</label><div class="range"><input id="conf" type="range" min="1" max="99" value="83"><output id="confOut">83%</output></div></div>
<div id="erro" class="err"></div><button id="gerar" class="btn">Gerar meu crachá</button><p class="hint">Requer Worker em <b>/api/generate-shirt-image</b> com <b>OPENAI_API_KEY</b>.</p>
</section>
<section id="saida" class="out"><h2>Credencial aprovada ✓</h2><div class="frame"><img id="preview" alt="Crachá gerado"></div><button id="baixar" class="ghost">Baixar imagem</button></section>
<canvas id="canvas" width="1080" height="1920"></canvas>
</main>
<div id="loading" class="loading"><div><div class="spin"></div><p>Gerando foto realista com a camisa escolhida...</p></div></div>
<script>
const API='/api/generate-shirt-image',$=id=>document.getElementById(id),cv=$('canvas'),ctx=cv.getContext('2d');let selfie='',finalBlob=null,aiImg=null;$('conf').oninput=e=>$('confOut').textContent=e.target.value+'%';$('foto').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{selfie=r.result;$('thumb').src=selfie};r.readAsDataURL(f)};function err(m){$('erro').textContent=m;$('erro').classList.add('on')}function ok(){$('erro').classList.remove('on')}function img(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=src})}function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function cover(im,x,y,w,h){const r=Math.max(w/im.width,h/im.height),sw=w/r,sh=h/r;ctx.drawImage(im,(im.width-sw)/2,(im.height-sh)/2,sw,sh,x,y,w,h)}async function geraIA(camisa){const r=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({selfieDataUrl:selfie,shirt:camisa})});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={error:t}}if(!r.ok||!j.imageDataUrl)throw new Error(j.error||'A API não retornou imagem.');return img(j.imageDataUrl)}function draw(d){ctx.fillStyle='#03120b';ctx.fillRect(0,0,1080,1920);let g=ctx.createRadialGradient(160,120,10,160,120,820);g.addColorStop(0,'rgba(255,223,0,.34)');g.addColorStop(1,'rgba(255,223,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,1080,1920);ctx.strokeStyle='rgba(255,223,0,.75)';ctx.lineWidth=4;round(45,45,990,1830,38);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.18)';round(465,72,150,28,14);ctx.fill();ctx.textAlign='center';ctx.fillStyle='#ffdf00';ctx.font='52px Anton';ctx.fillText('CONVOCADO PELA IA',540,155);ctx.fillStyle='#f6f1df';ctx.font='25px IBM Plex Mono';ctx.fillText('BRASIL × NORUEGA • 2026',540,205);ctx.save();round(120,260,840,860,34);ctx.clip();cover(aiImg,120,220,840,930);let v=ctx.createLinearGradient(0,720,0,1120);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,.78)');ctx.fillStyle=v;ctx.fillRect(120,720,840,400);ctx.restore();ctx.fillStyle=d.camisa==='azul'?'#1556c8':'#ffdf00';round(335,850,410,44,8);ctx.fill();ctx.fillStyle=d.camisa==='azul'?'#fff':'#06200f';ctx.font='20px IBM Plex Mono';ctx.fillText(d.camisa==='azul'?'CAMISA 2 • AZUL GERADA POR IA':'CAMISA 1 • AMARELA GERADA POR IA',540,880);ctx.fillStyle='rgba(4,36,18,.92)';round(235,920,610,54,27);ctx.fill();ctx.fillStyle='#ffdf00';ctx.font='20px IBM Plex Mono';ctx.fillText('✓ FOTO REAL NO MODELO PREMIUM',540,955);ctx.fillStyle='#f3f0df';ctx.font='132px Anton';ctx.fillText(d.nome.toUpperCase(),540,1135);ctx.fillStyle='#ffdf00';ctx.font='54px Anton';ctx.fillText('ANALISTA-CHEFE DA ARQUIBANCADA',540,1215);ctx.fillStyle='rgba(246,241,223,.65)';ctx.font='22px IBM Plex Mono';ctx.fillText(d.cidade.toUpperCase(),540,1260);ctx.fillStyle='#dce1d5';ctx.font='25px IBM Plex Mono';ctx.fillText('PALPITE',540,1360);ctx.font='98px Anton';ctx.fillStyle='#ffdf00';ctx.fillText(d.gbra,435,1460);ctx.fillStyle='#f3f0df';ctx.fillText('×',540,1450);ctx.fillText(d.gnor,645,1460);ctx.fillStyle='#ffdf00';ctx.font='66px Anton';ctx.fillText(d.conf+'%',250,1630);ctx.fillStyle='#d7ddcf';ctx.font='25px IBM Plex Mono';ctx.fillText('JOGADOR-CHAVE: '+d.jogador.toUpperCase(),540,1725);ctx.fillStyle='#f4f1df';ctx.font='italic 800 38px Archivo';ctx.fillText('Hoje o dado é simples: Brasil vence.',540,1810);ctx.fillStyle='#ffdf00';ctx.font='26px IBM Plex Mono';ctx.fillText('GERE O SEU • @ALBERTOBRI7O',540,1905)}$('gerar').onclick=async()=>{ok();const nome=$('nome').value.trim(),cidade=$('cidade').value.trim(),jogador=$('jogador').value.trim(),camisa=document.querySelector('input[name=camisa]:checked').value;if(!nome||!cidade||!jogador||!selfie)return err('Preencha tudo e envie uma selfie.');$('loading').classList.add('on');$('gerar').disabled=true;try{aiImg=await geraIA(camisa);draw({nome,cidade,jogador,camisa,gbra:$('gbra').value,gnor:$('gnor').value,conf:$('conf').value});finalBlob=await new Promise(r=>cv.toBlob(r,'image/png'));$('preview').src=URL.createObjectURL(finalBlob);$('saida').classList.add('on');$('saida').scrollIntoView({behavior:'smooth'})}catch(e){err(e.message)}finally{$('loading').classList.remove('on');$('gerar').disabled=false}};$('baixar').onclick=()=>{if(!finalBlob)return;const a=document.createElement('a');a.href=URL.createObjectURL(finalBlob);a.download='cracha-ia-torcida.png';a.click()};
</script>
</body>
</html>
